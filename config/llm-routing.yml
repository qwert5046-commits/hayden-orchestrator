# LLM 라우팅 / 비용 정책
# Hayden Phase 0 산출물 #5(AI 모델 선택)에서 이 파일을 1순위 → 2순위 → fallback 순으로 제시한다.
# 모델명은 6 개월 단위로 deprecate 되므로 valid_until 이 지나면 사용자에게 검증을 요청해야 한다.

# 사용자가 직접 본인 비용 정책에 맞춰 이 파일을 수정 가능.
# hayden.md 는 이 파일을 읽고 그대로 사용한다.

models:
  cheap:
    name: gemini-3.1-flash-lite
    cost_per_1m_input_usd: 0.25
    cost_per_1m_output_usd: 1.50
    valid_until: 2026-12     # 이 날짜 이후 hayden 은 사용자에게 모델명 갱신 요청
    notes: "저비용 1순위. 단순 텍스트 생성에 우선 사용. (이전 preview 라벨 → GA 전환됨)"

  medium:
    name: gemini-2.5-flash
    cost_per_1m_input_usd: 0.30
    cost_per_1m_output_usd: 2.50
    valid_until: 2026-12
    notes: "중간 품질 2순위. 1순위가 한도 초과 / 품질 부족 시 폴백."

  fallback:
    name: claude-sonnet-4-6
    cost_per_1m_input_usd: 3.00
    cost_per_1m_output_usd: 15.00
    valid_until: 2026-09
    notes: "최후 폴백. 한국어 / 긴 컨텍스트가 핵심일 때만 우선 검토."

# Hayden 자체가 사용하는 모델 (orchestrator)
# 단가도 함께 명시해야 docs/COST_TRACKER.md 의 80/90/100% 가드가 정확히 계산됨.
# (Codex 리뷰 M2 fix — orchestrator 단가 누락은 안전장치 우회 패턴)
orchestrator:
  hayden:
    name: claude-opus-4-7
    cost_per_1m_input_usd: 15.00
    cost_per_1m_output_usd: 75.00
    valid_until: 2026-09
  planner:
    name: claude-sonnet-4-6
    cost_per_1m_input_usd: 3.00
    cost_per_1m_output_usd: 15.00
    valid_until: 2026-09
  coder:
    name: claude-sonnet-4-6
    cost_per_1m_input_usd: 3.00
    cost_per_1m_output_usd: 15.00
    valid_until: 2026-09
  reviewer:
    name: claude-sonnet-4-6
    cost_per_1m_input_usd: 3.00
    cost_per_1m_output_usd: 15.00
    valid_until: 2026-09

# 모델 자동 폴백 정책 (생성 코드에 적용)
auto_fallback:
  trigger_patterns:
    - "404"
    - "not found"
    - "unknown model"
  do_not_fallback_on:
    - "authentication"
    - "quota"
    - "rate limit"
    - "timeout"
  reason: |
    인증 / 할당 / rate limit / timeout 은 다른 모델로 재시도해도 의미 없음 (계정 단위 이슈).
    모델 자체가 사라진 경우(404 / unknown model) 에만 다음 순위로 폴백.
